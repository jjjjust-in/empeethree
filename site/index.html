<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EMPEETHREE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber: #e8a020;
      --amber-dim: #a06810;
      --bg: #0e0e0e;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      font-family: 'JetBrains Mono', monospace;
      color: var(--amber);
      overflow: hidden;
    }

    /* scanline overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0,0,0,0.12) 2px,
        rgba(0,0,0,0.12) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* ── GLYPH CANVAS ── */
    #glyph-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* ── COVER ── */
    #cover {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      background: rgba(14, 14, 14, 0.82);
      cursor: pointer;
      z-index: 10;
      transition: transform 0.8s cubic-bezier(0.76, 0, 0.24, 1);
    }

    #cover.slide-up {
      transform: translateY(-100%);
    }

    #logo-canvas {
      display: block;
      width: 100%;
      max-width: 700px;
    }

    #loader-status, #tap-hint {
      font-size: 0.72rem;
      color: var(--amber-dim);
      letter-spacing: 0.06em;
    }

    #tap-hint {
      animation: blink 1.2s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* ── REVEAL ── */
    #reveal {
      display: none;
      position: fixed;
      inset: 0;
      align-items: center;
      justify-content: center;
      z-index: 5;
    }

    #reveal.visible {
      display: flex;
    }

    /* dark legibility box */
    .reveal-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.4rem;
      padding: 2.4rem 2rem;
      background: rgba(10, 10, 10, 0.92);
      border: 1px solid var(--amber-dim);
      max-width: 520px;
      width: calc(100% - 2rem);
      text-align: center;
    }

    #reveal-logo-canvas {
      display: block;
      width: 100%;
      max-width: 460px;
    }

    #reveal p {
      font-size: clamp(0.72rem, 1.8vw, 0.9rem);
      color: var(--amber-dim);
      letter-spacing: 0.06em;
      line-height: 2;
      text-shadow: 0 0 8px rgba(232,160,32,0.3);
    }

    /* ── FORM ── */
    #mc-form {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      width: 100%;
    }

    #mc-form label {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: var(--amber-dim);
      text-align: center;
    }

    .field-row {
      display: flex;
      width: 100%;
      border: 1px solid var(--amber-dim);
    }

    .field-row:focus-within {
      border-color: var(--amber);
      box-shadow: 0 0 8px rgba(232,160,32,0.3);
    }

    #mc-email {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 0.6rem 0.8rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      color: var(--amber);
      caret-color: var(--amber);
    }

    #mc-email::placeholder { color: var(--amber-dim); }

    #mc-submit {
      background: transparent;
      border: none;
      border-left: 1px solid var(--amber-dim);
      padding: 0.6rem 1rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: var(--amber);
      cursor: pointer;
      letter-spacing: 0.05em;
      white-space: nowrap;
      transition: background 0.2s, color 0.2s;
    }

    #mc-submit:hover {
      background: var(--amber);
      color: var(--bg);
    }

    #mc-response {
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      min-height: 1.2em;
      color: var(--amber-dim);
    }

    #mc-response.success { color: #4caf50; }
    #mc-response.error   { color: #e05050; }
  </style>
</head>
<body>

  <!-- full-screen glyph canvas -->
  <canvas id="glyph-canvas"></canvas>

  <!-- cover / splash -->
  <div id="cover">
    <canvas id="logo-canvas"></canvas>
    <div id="loader-status">&gt; indexing library<span id="dots"></span></div>
    <div id="tap-hint" style="display:none;">&gt; click anywhere to continue_</div>
  </div>

  <!-- reveal / email capture — hidden until click -->
  <div id="reveal">
    <div class="reveal-box">
      <canvas id="reveal-logo-canvas"></canvas>
      <p>
        A desktop MP3 player.<br />
        Plays your local files.<br />
        No subscriptions, no cloud, no accounts.
      </p>
      <form id="mc-form"
            action="https://justinmckinley.us6.list-manage.com/subscribe/post?u=dcca3dbde1eba0fa34e84fc62&amp;id=0048b7bd73&amp;f_id=00d91ae3f0"
            method="post"
            target="_blank"
            novalidate>
        <label for="mc-email">&gt; enter your email to be notified at launch</label>
        <div class="field-row">
          <input id="mc-email"
                 type="email"
                 name="EMAIL"
                 placeholder="you@example.com"
                 required />
          <!-- honeypot — do not remove -->
          <div style="position:absolute;left:-5000px" aria-hidden="true">
            <input type="text" name="JJJJ" tabindex="-1" value="" />
          </div>
          <button id="mc-submit" type="submit">&gt; notify me</button>
        </div>
        <div id="mc-response" role="status"></div>
      </form>
    </div>
  </div>

  <script>
    // ── AMBER THEME ────────────────────────────────────────────────────────────
    const LOGO_COLOR    = [234, 172,  52];
    const BAR_COLORS    = [[234,172,52],[234,172,52],[145,82,10],[90,50,5],[52,28,0],[52,28,0],[24,12,0]];
    const C_BASE        = [232, 160,  32];
    const C_HOT         = [255, 210,  80];
    const C_GLITCH      = [255, 200,  60];

    function tc([r, g, b], a) {
      return `rgba(${r},${g},${b},${a.toFixed(3)})`;
    }

    // ── LOGO CANVAS RENDERER (ported from app) ────────────────────────────────
    function renderLogoCanvas(cv, heightRatio, charAlphas, charOverrides, barPulses) {
      const DPR = window.devicePixelRatio || 1;
      const W   = cv.offsetWidth || 600;
      const H   = Math.round(W * heightRatio);
      cv.width  = W * DPR;
      cv.height = H * DPR;
      cv.style.height = H + 'px';

      const ctx = cv.getContext('2d');
      ctx.scale(DPR, DPR);

      const N_BARS   = 7;
      const BAR_W    = Math.max(2, W * 0.014);
      const BAR_GAP  = Math.max(1, W * 0.007);
      const NAME_PAD = W * 0.038;
      const WALL_PAD = W * 0.03;

      let fontSize = 10;
      ctx.font = `bold ${fontSize}px 'JetBrains Mono', monospace`;
      const availNameW = W - 2 * (WALL_PAD + N_BARS * BAR_W + (N_BARS - 1) * BAR_GAP + NAME_PAD);
      while (ctx.measureText('EMPEETHREE').width < availNameW && fontSize < 200) {
        fontSize++;
        ctx.font = `bold ${fontSize}px 'JetBrains Mono', monospace`;
      }
      fontSize = Math.max(1, fontSize - 1);
      ctx.font = `bold ${fontSize}px 'JetBrains Mono', monospace`;

      const nameW  = ctx.measureText('EMPEETHREE').width;
      const nameX  = W / 2 - nameW / 2;
      const cy     = H / 2;
      const barH   = H * 0.38;
      const barTop = cy - barH / 2;

      // render to offscreen for glow
      const off = document.createElement('canvas');
      off.width = W * DPR; off.height = H * DPR;
      const og = off.getContext('2d');
      og.scale(DPR, DPR);
      og.font = ctx.font;

      function drawElements(g, alpha) {
        for (let i = 0; i < N_BARS; i++) {
          const bp = barPulses ? barPulses[i] : 1.0;
          const [r, gv, b] = BAR_COLORS[i];
          g.fillStyle = `rgba(${r},${gv},${b},${(alpha * bp).toFixed(3)})`;
          g.fillRect(nameX - NAME_PAD - BAR_W - i * (BAR_W + BAR_GAP), barTop, BAR_W, barH);
          g.fillRect(nameX + nameW + NAME_PAD + i * (BAR_W + BAR_GAP), barTop, BAR_W, barH);
        }
        if (charAlphas || charOverrides) {
          const word = 'EMPEETHREE';
          const charW = nameW / word.length;
          for (let i = 0; i < word.length; i++) {
            const a  = charAlphas ? (charAlphas[i] ?? 1.0) : 1.0;
            const ch = (charOverrides && charOverrides[i]) ? charOverrides[i] : word[i];
            g.fillStyle = tc(LOGO_COLOR, alpha * a);
            g.fillText(ch, nameX + i * charW, cy + fontSize * 0.35);
          }
        } else {
          g.fillStyle = tc(LOGO_COLOR, alpha);
          g.fillText('EMPEETHREE', nameX, cy + fontSize * 0.35);
        }
      }

      drawElements(og, 1.0);

      ctx.fillStyle = '#0d0d0d';
      ctx.fillRect(0, 0, W, H);

      ctx.save(); ctx.filter = 'blur(18px)'; ctx.globalAlpha = 0.55; ctx.drawImage(off, 0, 0, W, H); ctx.restore();
      ctx.save(); ctx.filter = 'blur(6px)';  ctx.globalAlpha = 0.70; ctx.drawImage(off, 0, 0, W, H); ctx.restore();
      ctx.save(); ctx.filter = 'blur(2px)';  ctx.globalAlpha = 0.85; ctx.drawImage(off, 0, 0, W, H); ctx.restore();
      ctx.save(); ctx.filter = 'none';       ctx.globalAlpha = 1.0;  drawElements(ctx, 1.0);          ctx.restore();

      for (let y = 0; y < H; y += 4) {
        ctx.fillStyle = 'rgba(0,0,0,0.22)';
        ctx.fillRect(0, y, W, 1);
      }
    }

    // ── ANIMATED COVER LOGO ───────────────────────────────────────────────────
    const logoCv = document.getElementById('logo-canvas');

    const FLICKER      = [2, 8];
    const fstate       = FLICKER.map(() => ({ alpha: 1.0, timer: 0, on: true }));
    const charAlphas   = Array(10).fill(1.0);
    const charOverrides = Array(10).fill(null);
    const swap3        = { active: false, timer: 0 };
    const BAR_FREQS    = [1.3, 0.7, 2.1, 1.6, 0.9, 1.8, 0.5];
    const BAR_PHASES   = [0.0, 2.4, 1.1, 4.8, 0.7, 3.2, 5.5];

    function tickFlicker(fs) {
      if (fs.timer > 0) {
        fs.timer--;
        fs.alpha = fs.on ? 1.0 : (Math.random() < 0.4 ? 0.06 + Math.random() * 0.2 : 0.05);
      } else {
        if (!fs.on) {
          fs.on = true; fs.alpha = 1.0;
          fs.timer = 80 + Math.floor(Math.random() * 220);
        } else if (Math.random() < 0.004) {
          fs.on = false; fs.alpha = 0.05;
          fs.timer = 2 + Math.floor(Math.random() * 10);
        }
      }
    }

    function tickSwap3() {
      if (swap3.timer > 0) {
        swap3.timer--;
      } else if (swap3.active) {
        swap3.active = false;
        charOverrides[3] = null;
        swap3.timer = 120 + Math.floor(Math.random() * 300);
      } else if (Math.random() < 0.005) {
        swap3.active = true;
        charOverrides[3] = '3';
        swap3.timer = 20 + Math.floor(Math.random() * 25);
      }
    }

    let logoRafId = null;
    let logoRunning = true;

    function logoFrame() {
      if (!logoRunning) return;
      fstate.forEach(tickFlicker);
      tickSwap3();

      if (swap3.active) {
        for (let i = 0; i < 10; i++) charAlphas[i] = (i === 1 || i === 2 || i === 3) ? 1.0 : 0.06;
      } else {
        charAlphas.fill(1.0);
        fstate.forEach((fs, i) => { charAlphas[FLICKER[i]] = fs.alpha; });
      }

      const t = performance.now() / 1000;
      const barPulses = BAR_FREQS.map((f, i) =>
        swap3.active ? 0.0 : 0.55 + 0.45 * Math.sin(t * f + BAR_PHASES[i])
      );
      renderLogoCanvas(logoCv, 0.22, charAlphas, charOverrides, barPulses);
      logoRafId = requestAnimationFrame(logoFrame);
    }

    window.addEventListener('resize', () => {
      if (!logoRunning) return;
      renderLogoCanvas(logoCv, 0.22, charAlphas, charOverrides, null);
    });

    // ── GLYPH CANVAS ──────────────────────────────────────────────────────────
    const VIZ_CHARS = [
      ' ', '·', '∙', '˙', '⠂', '⠄', '⠈', '⠐', '⠠',
      ':', ';', '!', '+', '~', '=',
      '▖', '▗', '▘', '▝', '▚', '▞', '▒',
      '▁', '▂', '▃', '▄', '▅', '▆', '▇',
      '▏', '▎', '▍', '▌', '▋', '▊', '▉',
      '▙', '▛', '▜', '▟',
      '╱', '╲', '╳', '░', '╬', '╪', '╫', '▓', '█',
    ];
    const VIZ_GLITCH = [
      '╔', '╗', '╚', '╝', '║', '═', '╠', '╣', '╦', '╩',
      '▀', '▄', '▐', '◆', '●', '■', '⌐', '¬', '¦',
      '╭', '╮', '╯', '╰', '◈', '◉', '▸', '∆', '≈', '≡',
      '⠿', '⡿', '⢿', '⣿', '⠛', '⠻', '⣹', '⢺', '⡼', '⠼',
    ];

    const glyphCv  = document.getElementById('glyph-canvas');
    const glyphCtx = glyphCv.getContext('2d');

    const VIZ_BANDS = 28;
    const vizAmps   = new Float32Array(VIZ_BANDS).fill(0);
    const bandPhase = Float32Array.from({length: VIZ_BANDS}, () => Math.random() * Math.PI * 2);
    const bandSpeed = Float32Array.from({length: VIZ_BANDS}, (_, i) =>
      0.007 + (i / VIZ_BANDS) * 0.011 + Math.random() * 0.005
    );

    let vizGrid = null;
    let tick = 0;

    const offCv  = document.createElement('canvas');
    const offCtx = offCv.getContext('2d');

    function resize() {
      glyphCv.width  = window.innerWidth;
      glyphCv.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', () => { resize(); vizGrid = null; });

    function drawGlyphs() {
      requestAnimationFrame(drawGlyphs);
      tick++;

      const W = window.innerWidth;
      const H = window.innerHeight;

      const globalPulse = 0.48 + 0.28 * Math.sin(tick * 0.006);
      for (let b = 0; b < VIZ_BANDS; b++) {
        bandPhase[b] += bandSpeed[b];
        const edgeFade = 1 - Math.pow(Math.abs(b - VIZ_BANDS / 2) / (VIZ_BANDS / 2), 1.2) * 0.5;
        const wave = (Math.sin(bandPhase[b]) * 0.5 + 0.5)
                   * (Math.sin(bandPhase[b] * 1.7 + b * 0.3) * 0.3 + 0.7)
                   * edgeFade;
        vizAmps[b] += (wave * globalPulse * 0.6 - vizAmps[b]) * 0.05;
      }

      glyphCtx.fillStyle = '#0e0e0e';
      glyphCtx.fillRect(0, 0, W, H);

      const fSize = Math.max(9, Math.min(14, W / 52));
      const cW    = fSize * 0.62;
      const cH    = fSize * 1.55;
      const cols  = Math.floor(W / cW);
      const rows  = Math.floor(H / cH);

      if (!vizGrid || vizGrid.cols !== cols || vizGrid.rows !== rows) {
        vizGrid = {
          cols, rows,
          cidx:   new Uint8Array(cols * rows).fill(0),
          gcidx:  new Uint8Array(cols * rows).fill(255),
          gtimer: new Uint8Array(cols * rows).fill(0),
        };
      }

      for (let c = 0; c < cols; c++) {
        const dist = Math.abs(c - (cols - 1) / 2) / ((cols - 1) / 2);
        const band = Math.floor(Math.pow(dist, 0.55) * (VIZ_BANDS - 1));
        const amp  = vizAmps[band];

        for (let r = 0; r < rows; r++) {
          const idx = r * cols + c;
          if (vizGrid.gtimer[idx] > 0) { vizGrid.gtimer[idx]--; } else { vizGrid.gcidx[idx] = 255; }

          const changeP = amp > 0.4 ? 0.12 : amp > 0.2 ? 0.05 : 0.012;
          if (Math.random() < changeP) {
            const target = Math.round(amp * (VIZ_CHARS.length - 1));
            const jitter = Math.floor((Math.random() - 0.5) * 4);
            vizGrid.cidx[idx] = Math.max(0, Math.min(VIZ_CHARS.length - 1, target + jitter));
          }

          const glitchP = amp > 0.45 ? 0.025 : amp > 0.25 ? 0.008 : 0.002;
          if (Math.random() < glitchP) {
            vizGrid.gcidx[idx]  = Math.floor(Math.random() * VIZ_GLITCH.length);
            vizGrid.gtimer[idx] = Math.floor(Math.random() * 5) + 1;
          }
        }
      }

      if (offCv.width !== W || offCv.height !== H) { offCv.width = W; offCv.height = H; }
      offCtx.clearRect(0, 0, W, H);
      offCtx.font         = `${fSize}px 'JetBrains Mono', monospace`;
      offCtx.textBaseline = 'top';
      offCtx.textAlign    = 'left';

      for (let c = 0; c < cols; c++) {
        const dist = Math.abs(c - (cols - 1) / 2) / ((cols - 1) / 2);
        const band = Math.floor(Math.pow(dist, 0.55) * (VIZ_BANDS - 1));
        const amp  = vizAmps[band];
        const x    = c * cW;

        for (let r = 0; r < rows; r++) {
          const vDist = Math.abs(r - (rows - 1) / 2) / ((rows - 1) / 2);
          const vFade = Math.pow(1 - vDist, 0.6);
          const idx      = r * cols + c;
          const isGlitch = vizGrid.gcidx[idx] !== 255;
          const ch       = isGlitch ? VIZ_GLITCH[vizGrid.gcidx[idx]] : VIZ_CHARS[vizGrid.cidx[idx]];
          if (!isGlitch && ch === ' ') continue;

          const y     = r * cH;
          const ghost = 0.055 + vFade * 0.03;
          const reach = Math.max(0, amp - vDist * 0.82);
          const lit   = Math.pow(reach, 0.45) * vFade * 0.96;
          const alpha = Math.min(1, ghost + lit);

          if (isGlitch) {
            offCtx.fillStyle = tc(C_GLITCH, Math.min(1, alpha * 1.6));
          } else if (amp > 0.4 && reach > 0.1) {
            const hot = (amp - 0.4) / 0.6 * vFade;
            offCtx.fillStyle = tc(C_HOT, hot);
            offCtx.fillText(ch, x, y);
            offCtx.fillStyle = tc(C_BASE, alpha);
          } else {
            offCtx.fillStyle = tc(C_BASE, alpha);
          }
          offCtx.fillText(ch, x, y);
        }
      }

      glyphCtx.save(); glyphCtx.filter = 'blur(10px)'; glyphCtx.globalAlpha = 0.5;  glyphCtx.drawImage(offCv, 0, 0); glyphCtx.restore();
      glyphCtx.save(); glyphCtx.filter = 'blur(4px)';  glyphCtx.globalAlpha = 0.75; glyphCtx.drawImage(offCv, 0, 0); glyphCtx.restore();
      glyphCtx.save(); glyphCtx.filter = 'blur(1px)';  glyphCtx.globalAlpha = 0.9;  glyphCtx.drawImage(offCv, 0, 0); glyphCtx.restore();
      glyphCtx.drawImage(offCv, 0, 0);
    }

    // ── STATUS MESSAGES ──────────────────────────────────────────────────────
    const messages = [
      'indexing library', 'loading tracks', 'calibrating waveform',
      'mounting filesystem', 'scanning metadata', 'decoding audio',
    ];
    let msgIdx = 0;
    const statusEl = document.getElementById('loader-status');
    const dotsEl   = document.getElementById('dots');
    let dotCount = 0;
    let ready = false;

    setInterval(() => {
      if (ready) return;
      dotCount = (dotCount + 1) % 4;
      dotsEl.textContent = '.'.repeat(dotCount);
    }, 400);

    setInterval(() => {
      if (ready) return;
      msgIdx = (msgIdx + 1) % messages.length;
      statusEl.childNodes[0].textContent = '\u003e ' + messages[msgIdx];
    }, 2200);

    const tapHint = document.getElementById('tap-hint');
    setTimeout(() => {
      ready = true;
      statusEl.style.display = 'none';
      tapHint.style.display = 'block';
    }, 5500);

    // ── START ─────────────────────────────────────────────────────────────────
    document.fonts.ready.then(() => {
      logoRafId = requestAnimationFrame(logoFrame);
      drawGlyphs();
    });

    // ── COVER / REVEAL ───────────────────────────────────────────────────────
    const cover      = document.getElementById('cover');
    const reveal     = document.getElementById('reveal');
    const revealLogo = document.getElementById('reveal-logo-canvas');
    const form       = document.getElementById('mc-form');
    const resp       = document.getElementById('mc-response');

    cover.addEventListener('click', () => {
      ready = true;
      cover.classList.add('slide-up');
      // show reveal, then render its logo once layout is established
      reveal.classList.add('visible');
      requestAnimationFrame(() => renderLogoCanvas(revealLogo, 0.22, null, null, null));
      // stop animating the cover logo once it's gone
      cover.addEventListener('transitionend', () => { logoRunning = false; }, { once: true });
    });

    form.addEventListener('submit', e => {
      e.preventDefault();
      const email = document.getElementById('mc-email').value.trim();
      if (!email) return;

      const action = form.action.replace('/post?', '/post-json?') + '&c=handleMC';
      const script = document.createElement('script');
      window.handleMC = data => {
        script.remove();
        if (data.result === 'success') {
          resp.textContent = '> ' + data.msg.replace(/<[^>]*>/g, '');
          resp.className = 'success';
          form.reset();
        } else {
          resp.textContent = '> ' + data.msg.replace(/<[^>]*>/g, '').slice(0, 120);
          resp.className = 'error';
        }
      };
      script.src = action + '&EMAIL=' + encodeURIComponent(email);
      document.body.appendChild(script);
    });
  </script>
</body>
</html>
